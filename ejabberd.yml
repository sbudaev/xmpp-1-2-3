###
###           ejabberd configuration file
###
### The parameters used in this configuration file are explained at
###
###       https://docs.ejabberd.im/admin/configuration
###
### The configuration file is written in YAML.
### *******************************************************
### *******           !!! WARNING !!!               *******
### *******     YAML IS INDENTATION SENSITIVE       *******
### ******* MAKE SURE YOU INDENT SECTIONS CORRECTLY *******
### *******************************************************
### Refer to http://en.wikipedia.org/wiki/YAML for the brief description.
###
###

hosts:
  - "myownchat.ptchat.net"

loglevel: info
log_rotate_size: 5242880
log_rotate_count: 4

# Default database type for a module lacking db_type option or if 
# auth_method option is not set.
default_db: mnesia

# The option defines in what format the users passwords are stored, plain text
# or in SCRAM format:
# scram: The password is not stored, only some information required to verify
# the hash provided by the client. It is impossible to obtain the original
# plain password from the stored information; for this reason, when this value
# is configured it cannot be changed to plain anymore. This format allows
# clients to authenticate using: SASL PLAIN and SASL
# SCRAM-SHA-1/256/512(-PLUS). The SCRAM variant depends on the auth_scram_hash
# option.
auth_password_format: scram

#ca_file: /opt/ejabberd/conf/cacert.pem

#certfiles:
#  - /opt/ejabberd/conf/server.pem

listen:
  -
    port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls_required: true

  # Direct-TLS for C2S (XEP-0368). Good practice is to forward  traffic from
  # port 443 to 5223, possibly multiplexing with HTTP using e.g. sslh
  # [https://wiki.xmpp.org/web/Tech_pages/XEP-0368], so modern clients can
  # bypass restrictive firewalls (in airports, hotels, etc.).
  -
    port: 5223
    ip: "::"
    module: ejabberd_c2s
    tls: true
    max_stanza_size: 65536
    shaper: c2s_shaper
    access: c2s
  -
    port: 5269
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288
  -
    ## s2s with tls enforced
    port: 5270
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288
    shaper: s2s_shaper
    tls: true
  -
    port: 5443
    ip: "::"
    module: ejabberd_http
    tls: true
    request_handlers:
      "/admin": ejabberd_web_admin
      #"/api": mod_http_api
      "/bosh": mod_bosh
      #"/captcha": ejabberd_captcha
      "/upload": mod_http_upload
      "/ws": ejabberd_http_ws
      #"/oauth": ejabberd_oauth
      /conversejs: mod_conversejs
      /: mod_http_fileserver

  # confugure for acme
  -
    port: 5280
    #ip: "::"
    module: ejabberd_http
    tls: false
    request_handlers:
      /.well-known/acme-challenge: ejabberd_acme

  # needed for audio/video, see
  # https://gist.github.com/iNPUTmice/a28c438d9bbf3f4a3d4c663ffaa224d9#notes-for-server-admins
  -
    port: 3478
    ip: "::"
    transport: udp
    module: ejabberd_stun
    use_turn: true
    ## The server's public IPv4 address:
    turn_ipv4_address: "111.222.333.444"
    ## The server's public IPv6 address:
    # turn_ipv6_address: "2001:db8::3"

#  -
#    port: 1883
#    ip: "::"
#    module: mod_mqtt
#    backlog: 1000

## Disabling digest-md5 SASL authentication. digest-md5 requires plain-text
### password storage (see auth_password_format option).
disable_sasl_mechanisms:
  - "digest-md5"
  - "X-OAUTH2"

s2s_use_starttls: required

acl:
  local:
    user_regexp: ""
  loopback:
    ip:
      - 127.0.0.0/8
      - ::1/128
      - ::FFFF:127.0.0.1/128
  admin:
    user:
       - "my_user_name@myownchat.ptchat.net"
       - "@localhost"

access_rules:
  local:
    allow: local
  c2s:
    deny: blocked
    allow: all
  ## Only admins can send announcement messages:
  announce:
    allow: admin
  ## Only admins can use the configuration interface:
  configure:
    allow: admin
  ## Only accounts of the local ejabberd server can create rooms:
  muc_create:
    allow: local
  ## Only accounts on the local ejabberd server can create Pubsub nodes:
  pubsub_createnode:
    allow: local
  ## Only allow to register from localhost
  trusted_network:
    allow: loopback

api_permissions:
  "webadmin":
    from:
      - ejabberd_web_admin
    who:
      access:
        allow:
          acl: admin
    what:
      - "*"    
  "console commands":
    from:
      - ejabberd_ctl
    who: all
    what: "*"
  "admin access":
    who:
      access:
        allow:
          acl: loopback
          acl: admin
      oauth:
        scope: "ejabberd:admin"
        access:
          allow:
            acl: loopback
            acl: admin
    what:
      - "*"
      - "!stop"
      - "!start"
  "public commands":
    who:
      ip: 127.0.0.1/8
    what:
      - status
      - connected_users_number

shaper:
  normal: 1000
  fast: 50000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all
  s2s_shaper: fast

max_fsm_queue: 10000

# ACME is ensabled
acme:
    auto: true
    contact: "mailto:postmaster@your_email.fqdn"      
    ## Staging environment
    ca_url: https://acme-staging-v02.api.letsencrypt.org/directory
    ## Production environment (the default):
    #ca_url: https://acme-v02.api.letsencrypt.org/directory

modules:
  mod_adhoc: {}
  mod_admin_extra: {}
  mod_auth_fast:
    token_lifetime: 14day
  mod_announce:
    access: announce
  mod_avatar: {}
  mod_block_strangers:
    log: true
  mod_blocking: {}
  mod_bosh: {}
  mod_conversejs:
    websocket_url: auto
    #conversejs_css: https://cdn.conversejs.org/12.0.0/dist/converse.min.css
    #conversejs_css: https://cdn.conversejs.org/12.0.0/dist/converse.css
    #conversejs_script: https://cdn.conversejs.org/12.0.0/dist/converse.min.js
    #conversejs_script: https://cdn.conversejs.org/12.0.0/dist/converse.js
    conversejs_resources: "/opt/lib/conversejs/package/dist"
    conversejs_plugins: ["libsignal-protocol.min.js"]
    #conversejs_plugins: ["libsignal-protocol.js"]
    # File path is: /opt/lib/conversejs/package/dist/plugins/libsignal-protocol.min.js
    conversejs_options:
      default_domain: "myownchat.ptchat.net"
      embed_3rd_party_media_players: true
      enable_smacks: true
      auto_away: 30
      auto_reconnect: true
      synchronize_availability: false
      message_carbons: true
      omemo_default: true
      show_images_inline: true
      clear_cache_on_logout: false
      i18n: "ru"
      locked_domain: "@HOST@"
      message_archiving: always
      auto_list_rooms: true
      auto_join_on_invite: true
      theme: dracula
  mod_caps: {}
  mod_carboncopy: {}
  mod_client_state: {}
  mod_configure: {}
  mod_disco: {}
  mod_s2s_bidi: {}
  mod_fail2ban: {}
  mod_http_api: {}
  mod_http_upload:
    #put_url: https://@HOST@:5443/upload
    put_url: https://@HOST@/upload
    docroot: "/var/ejabberd/upload"
    thumbnail: false
    access: local
    custom_headers:
      "Access-Control-Allow-Origin": "*"
      "Access-Control-Allow-Methods": "GET, POST, PUT, OPTIONS, DELETE"
      "Access-Control-Allow-Headers": "Content-Type, Origin, X-Requested-With"
  # Configure fileserver serving lounching page
  mod_http_fileserver:
    docroot:
      /: /opt/www
    directory_indices: ["index.html", "index.html"]
    accesslog: /var/log/ejabberd/access.log
  mod_last: {}
  mod_mam:
    ## Mnesia is limited to 2GB, better to use an SQL backend
    ## For small servers SQLite is a good fit and is very easy
    ## to configure. Uncomment this when you have SQL configured:
    db_type: mnesia
    assume_mam_usage: true
    default: always
  # mod_mqtt: {}
  mod_muc:
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    access_mam:
      - allow
    default_room_options:
      allow_subscription: true  # enable MucSub
      mam: true
  mod_muc_admin: {}
  mod_muc_log: {}
  mod_muc_occupantid: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_proxy65:
    access: local
    max_connections: 50
  mod_pubsub:
    access_createnode: pubsub_createnode
    plugins:
      - flat
      - pep
    force_node_config:
      #"eu.siacs.conversations.axolotl.*":
      #  access_model: open
      ## Avoid buggy clients to make their bookmarks public
      storage:bookmarks:
        access_model: whitelist
  mod_push: {}
  mod_push_keepalive: {}
  mod_register:
    ## Only accept registration requests from the "trusted"
    ## network (see access_rules section above).
    ## Think twice before enabling registration from any
    ## address. See the Jabber SPAM Manifesto for details:
    ## https://github.com/ge0rg/jabber-spam-fighting-manifesto
    #ip_access: trusted_network
    ## Allow change password by users
    access: none
  mod_roster:
    versioning: true
  # mod_s2s_dialback: {}
  # mod_s2s_bidi: {}
  mod_shared_roster: {}
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  # mod_stun_disco -- needed for audio/video, see
  # https://gist.github.com/iNPUTmice/a28c438d9bbf3f4a3d4c663ffaa224d9#notes-for-server-admins
  # and also https://www.process-one.net/blog/how-to-set-up-ejabberd-video-voice-calling/
  mod_stun_disco: {}
  mod_vcard: {}
  mod_vcard_xupdate: {}
  mod_version:
    show_os: false

### Local Variables:
### mode: yaml
### End:
### vim: set filetype=yaml tabstop=8
